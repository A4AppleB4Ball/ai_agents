name: "Build & Push to ECR"

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        type: choice
        required: true
        options: [dev, preprod, prod]
      services:
        description: "Which services to build"
        type: choice
        required: true
        default: "both"
        options: [app, web, both]

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1  # Change to your region
  PROJECT: digital-ai-agents
  REGISTRY: ${{ vars.ECR_REGISTRY }}  # Set in GitHub repo variables

jobs:
  build-push:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    outputs:
      app_image: ${{ steps.build-app.outputs.image }}
      web_image: ${{ steps.build-web.outputs.image }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-session-name: ecr-push-session
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ inputs.environment == 'preprod' && secrets.ROLE_TO_ASSUME_CDK_ROLE_PREPROD || inputs.environment == 'prod' && secrets.ROLE_TO_ASSUME_CDK_ROLE_PROD || secrets.ROLE_TO_ASSUME_CDK_ROLE_DEV }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image tag
        id: tag
        run: |
          TAG="${{ inputs.environment }}-$(date +%Y%m%d-%H%M%S)-$(git rev-parse --short HEAD)"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Build & Push app
        id: build-app
        if: ${{ inputs.services == 'app' || inputs.services == 'both' }}
        run: |
          REPO_NAME="${{ env.PROJECT }}/app"
          IMAGE="${{ env.REGISTRY }}/${REPO_NAME}:${{ steps.tag.outputs.tag }}"
          IMAGE_LATEST="${{ env.REGISTRY }}/${REPO_NAME}:${{ inputs.environment }}-latest"

          aws ecr create-repository --repository-name "$REPO_NAME" --region ${{ env.AWS_REGION }} 2>/dev/null || true

          docker build -t "$IMAGE" -t "$IMAGE_LATEST" -f deploy/Dockerfile .
          docker push "$IMAGE"
          docker push "$IMAGE_LATEST"

          echo "image=$IMAGE_LATEST" >> "$GITHUB_OUTPUT"
          echo "### App Image" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "$IMAGE" >> "$GITHUB_STEP_SUMMARY"
          echo "$IMAGE_LATEST" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: Build & Push web
        id: build-web
        if: ${{ inputs.services == 'web' || inputs.services == 'both' }}
        run: |
          REPO_NAME="${{ env.PROJECT }}/web"
          IMAGE="${{ env.REGISTRY }}/${REPO_NAME}:${{ steps.tag.outputs.tag }}"
          IMAGE_LATEST="${{ env.REGISTRY }}/${REPO_NAME}:${{ inputs.environment }}-latest"

          aws ecr create-repository --repository-name "$REPO_NAME" --region ${{ env.AWS_REGION }} 2>/dev/null || true

          docker build -t "$IMAGE" -t "$IMAGE_LATEST" \
            --build-arg NEXT_PUBLIC_API_URL="${{ vars.NEXT_PUBLIC_API_URL }}" \
            --build-arg NEXT_PUBLIC_WS_URL="${{ vars.NEXT_PUBLIC_WS_URL }}" \
            web/
          docker push "$IMAGE"
          docker push "$IMAGE_LATEST"

          echo "image=$IMAGE_LATEST" >> "$GITHUB_OUTPUT"
          echo "### Web Image" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "$IMAGE" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: Deploy app to ECS
        if: ${{ inputs.services == 'app' || inputs.services == 'both' }}
        run: |
          aws ecs update-service \
            --cluster ${{ env.PROJECT }}-${{ inputs.environment }}-ecs \
            --service ${{ env.PROJECT }}-${{ inputs.environment }}-app \
            --force-new-deployment \
            --region ${{ env.AWS_REGION }}
          echo "Forced new deployment for app service"

      - name: Deploy web to ECS
        if: ${{ inputs.services == 'web' || inputs.services == 'both' }}
        run: |
          aws ecs update-service \
            --cluster ${{ env.PROJECT }}-${{ inputs.environment }}-ecs \
            --service ${{ env.PROJECT }}-${{ inputs.environment }}-web \
            --force-new-deployment \
            --region ${{ env.AWS_REGION }}
          echo "Forced new deployment for web service"

      - name: Summary
        run: |
          echo "## Deployed to ${{ inputs.environment }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Images pushed and ECS services redeployed." >> "$GITHUB_STEP_SUMMARY"
